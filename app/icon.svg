<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="DMRC">
  <!--
    T45; 01-design-system.md §Iconography: "Favicon / icon.svg: new mark = paper wordmark on an
    evergreen tile (legible at 16px, carries the one brand color). FAVICON_BG = #175E4B (--ever
    light), FAVICON_MARK = #FBFAF8 (--paper)." The mark alone (no wordmark text — illegible at
    favicon sizes) is the same 14×14 rounded square from the header, filled paper on the evergreen
    ground. Hex literals are the T45-sanctioned exception to the token gate (05 token-drift row
    allowlists this exact file) — a static SVG asset has no CSS custom-property scope, and the
    favicon must stay a fixed evergreen mark regardless of the viewer's OS/browser theme. Keep the
    two fills in sync with scripts/generate-og.mjs's FAVICON_BG / FAVICON_MARK.
  -->
  <rect width="32" height="32" fill="#175E4B" />
  <rect x="9" y="9" width="14" height="14" rx="3" fill="#FBFAF8" />
</svg>
